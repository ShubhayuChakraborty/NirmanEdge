<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; overflow: hidden; font-family: sans-serif; }
canvas { display: block; }
#info {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: #888;
  letter-spacing: 0.08em;
  pointer-events: none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">DRAG TO ORBIT &nbsp;·&nbsp; SCROLL TO ZOOM</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0xffffff);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 500);
camera.position.set(28, 20, 34);
camera.lookAt(0, 6, 0);

// Lights
const ambient = new THREE.AmbientLight(0xfff8f0, 0.55);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff4e0, 1.1);
sun.position.set(30, 50, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -40;
sun.shadow.camera.right = 40;
sun.shadow.camera.top = 40;
sun.shadow.camera.bottom = -40;
sun.shadow.bias = -0.001;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xd0e8ff, 0.35);
fill.position.set(-20, 10, -10);
scene.add(fill);

// Materials
const concreteMat = new THREE.MeshLambertMaterial({ color: 0xdcdcdc });
const glassMat   = new THREE.MeshLambertMaterial({ color: 0xa8cce8, transparent: true, opacity: 0.75 });
const darkMat    = new THREE.MeshLambertMaterial({ color: 0x2c2c2c });
const metalMat   = new THREE.MeshLambertMaterial({ color: 0xb0b8c4 });
const accentMat  = new THREE.MeshLambertMaterial({ color: 0xf0f0f0 });
const roofMat    = new THREE.MeshLambertMaterial({ color: 0x888888 });
const groundMat  = new THREE.MeshLambertMaterial({ color: 0xeeeeee });
const roadMat    = new THREE.MeshLambertMaterial({ color: 0xcccccc });
const greenMat   = new THREE.MeshLambertMaterial({ color: 0xb8d4a0 });
const windowMat  = new THREE.MeshLambertMaterial({ color: 0x87b8e0, transparent: true, opacity: 0.8 });
const pillarMat  = new THREE.MeshLambertMaterial({ color: 0xc8c8c8 });

function box(w,h,d,mat,x,y,z){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z);
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
  return m;
}
function cyl(rt,rb,h,seg,mat,x,y,z){
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg), mat);
  m.position.set(x,y,z);
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
  return m;
}

// Ground
box(80,0.3,80,groundMat,0,-0.15,0);
box(8,0.05,80,roadMat,0,-0.1,0);
box(80,0.05,7,roadMat,0,-0.1,0);

// Green strips
box(6,0.1,80,greenMat,-10,-0.1,0);
box(6,0.1,80,greenMat,10,-0.1,0);

// Trees (simple)
function tree(x,z){
  cyl(0,0.15,0.9,6,darkMat,x,0.45,z);
  cyl(1.0,0.8,1.5,7,greenMat,x,1.9,z);
  cyl(0.7,0.4,1.3,7,greenMat,x,3.0,z);
  cyl(0.4,0.1,1.0,7,greenMat,x,3.9,z);
}
for(let i=-3;i<=3;i++) tree(-10,i*6);
for(let i=-3;i<=3;i++) tree(10,i*6);

// ─── BUILDING A: Tall glass tower ───
// Core
box(7,28,7,concreteMat,0,14,-2);
// Glass facade panels
for(let f=0;f<7;f++){
  for(let s=-2;s<=2;s++){
    box(1.1,3.2,0.05,windowMat,s*1.25,2+f*4,-5.55);
    box(1.1,3.2,0.05,windowMat,s*1.25,2+f*4,1.55);
    box(0.05,3.2,1.1,windowMat,-3.55,2+f*4,s*1.25-2);
    box(0.05,3.2,1.1,windowMat,3.55,2+f*4,s*1.25-2);
  }
}
// Setback floors
box(6,2,6,concreteMat,0,29,-2);
box(4.5,3,4.5,concreteMat,0,32.5,-2);
box(3,2,3,concreteMat,0,35,-2);
// Spire
cyl(0.12,0.2,4,8,metalMat,0,38,-2);
// Roof detail
box(6,0.15,6,roofMat,0,28.1,-2);

// ─── BUILDING B: Wide low-rise office ───
box(14,8,9,concreteMat,-14,4,8);
// Window grid
for(let r=0;r<2;r++) for(let c=0;c<5;c++){
  box(1.8,1.5,0.05,windowMat,-14+c*2.8-5.6,2.5+r*2.8,12.55);
}
// Entrance canopy
box(4,0.2,2.5,metalMat,-14,8.1,9.25);
box(0.15,1.6,0.15,pillarMat,-16,7.2,10.4);
box(0.15,1.6,0.15,pillarMat,-12,7.2,10.4);
// Parapet
box(14.3,0.5,0.2,concreteMat,-14,8.25,12.6);
box(14.3,0.5,0.2,concreteMat,-14,8.25,3.4);
box(0.2,0.5,9,concreteMat,-21.1,8.25,8);
box(0.2,0.5,9,concreteMat,-6.9,8.25,8);

// ─── BUILDING C: Modern tower with fins ───
box(8,20,6,concreteMat,14,10,4);
// Vertical fins
for(let i=0;i<5;i++){
  box(0.15,20,0.6,accentMat,10.5+i*1.8,10,7.1);
}
// Top slab
box(9,0.5,7,darkMat,14,20.25,4);
// Windows
for(let f=0;f<5;f++) for(let s=0;s<3;s++){
  box(1.6,1.8,0.05,windowMat,13+s*2-2,2.5+f*3.8,7.06);
}
// Mechanical penthouse
box(5,2.5,4,roofMat,14,21.75,4);

// ─── BUILDING D: Shorter brick-style ───
box(9,12,7,concreteMat,-14,-2+6,14+6); // adjusted to avoid overlap
box(9,0.4,7,darkMat,-14,12.2,20);
for(let f=0;f<3;f++) for(let c=0;c<3;c++){
  box(2,2.2,0.05,windowMat,-14+c*2.8-2.8,1.5+f*3.8,23.55);
}
// Entrance door
box(1.5,2.5,0.05,darkMat,-14,1.25,23.56);

// ─── Sidewalk curbs & details ───
box(80,0.2,0.4,accentMat,0,0.1,4.2);
box(80,0.2,0.4,accentMat,0,0.1,-4.2);
box(0.4,0.2,80,accentMat,4.2,0.1,0);
box(0.4,0.2,80,accentMat,-4.2,0.1,0);

// Street lamps
function lamp(x,z){
  cyl(0.06,0.06,4,8,darkMat,x,2,z);
  cyl(0.06,0.06,1.5,8,darkMat,x+0.75,3.75+0.75,z);
  const g=new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8),new THREE.MeshLambertMaterial({color:0xffffcc,emissive:0xffffaa,emissiveIntensity:0.8}));
  g.position.set(x+0.75,4.6,z);
  scene.add(g);
  cyl(0.06,0.06,0.8,8,darkMat,x,0.4,z);
}
lamp(-5.5,-8); lamp(5.5,-8);
lamp(-5.5,8); lamp(5.5,8);
lamp(-5.5,20); lamp(5.5,20);

// ─── Orbit controls (manual) ───
let isDragging=false, prevX=0, prevY=0;
let theta=0.82, phi=0.55, radius=52;
const target=new THREE.Vector3(0,6,0);

function updateCamera(){
  camera.position.x=target.x+radius*Math.sin(phi)*Math.sin(theta);
  camera.position.y=target.y+radius*Math.cos(phi);
  camera.position.z=target.z+radius*Math.sin(phi)*Math.cos(theta);
  camera.lookAt(target);
}
updateCamera();

const c=document.getElementById('c');
c.addEventListener('mousedown',e=>{isDragging=true;prevX=e.clientX;prevY=e.clientY;});
window.addEventListener('mouseup',()=>isDragging=false);
window.addEventListener('mousemove',e=>{
  if(!isDragging) return;
  theta-=(e.clientX-prevX)*0.005;
  phi=Math.max(0.1,Math.min(1.4,phi+(e.clientY-prevY)*0.005));
  prevX=e.clientX;prevY=e.clientY;
  updateCamera();
});
c.addEventListener('wheel',e=>{
  radius=Math.max(15,Math.min(100,radius+e.deltaY*0.05));
  updateCamera();
  e.preventDefault();
},{passive:false});

// Touch
let lastTouches=[];
c.addEventListener('touchstart',e=>{lastTouches=[...e.touches];});
c.addEventListener('touchmove',e=>{
  if(e.touches.length===1){
    const dx=e.touches[0].clientX-lastTouches[0].clientX;
    const dy=e.touches[0].clientY-lastTouches[0].clientY;
    theta-=dx*0.007;
    phi=Math.max(0.1,Math.min(1.4,phi+dy*0.007));
    updateCamera();
  }
  lastTouches=[...e.touches];
  e.preventDefault();
},{passive:false});

// Animate
let t=0;
(function loop(){
  requestAnimationFrame(loop);
  t+=0.004;
  // Subtle auto-rotate when idle
  theta+=0.0008;
  updateCamera();
  renderer.render(scene,camera);
})();

window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
